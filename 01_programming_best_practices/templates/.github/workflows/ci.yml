name: CI Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ===========================================================================
  # Code Quality & Linting
  # ===========================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install black isort ruff mypy
      - name: Check formatting (black)
        run: black --check --line-length=120 src/ tests/
      - name: Check import sorting (isort)
        run: isort --check-only --profile=black src/ tests/
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

  # ===========================================================================
  # Tests
  # ===========================================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project with dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=src/ --cov-report=term-missing --cov-fail-under=80

  # ===========================================================================
  # Documentation Quality (BLOCKING — enforces "No docs, no merge" policy)
  # ===========================================================================
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install documentation tools
        run: pip install pydocstyle interrogate
      - name: Install project
        run: pip install -e .
      - name: Check docstring style (Google convention)
        run: pydocstyle --convention=google src/
      - name: Check docstring coverage (≥ 95%)
        run: interrogate -v src/ --fail-under=95

  # ===========================================================================
  # Documentation Build
  # ===========================================================================
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install documentation dependencies
        run: |
          pip install -e ".[docs]"
          pip install mkdocs-material mkdocstrings[python] mkdocs-gen-files mkdocs-literate-nav
      - name: Build documentation (strict mode — fails on warnings)
        run: mkdocs build --strict
